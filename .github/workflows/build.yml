name: Build Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-server:
    name: Build server (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: win32-x64
            os: windows-latest
            artifact_name: server-bin-win32-x64
            platform_key: win32-x64
            binary_name: vscode-mcshader.exe
          - name: linux-x64
            os: ubuntu-latest
            artifact_name: server-bin-linux-x64
            platform_key: linux-x64
            binary_name: vscode-mcshader
          - name: darwin-arm64
            os: macos-latest
            artifact_name: server-bin-darwin-arm64
            platform_key: darwin-arm64
            binary_name: vscode-mcshader

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build release binary
        run: cargo build --release --manifest-path server/Cargo.toml

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p "dist/server-bin/${{ matrix.platform_key }}"
          cp "server/target/release/${{ matrix.binary_name }}" "dist/server-bin/${{ matrix.platform_key }}/${{ matrix.binary_name }}"

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/server-bin/
          if-no-files-found: error

  package-extension:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-bin-*
          path: dist/server-bin

      - name: Install dependencies
        run: npm ci

      - name: Prepare server layout
        shell: bash
        run: |
          mkdir -p server/bin
          cp -r dist/server-bin/*/* server/bin/
          find server/bin -type f ! -name '*.exe' -exec chmod +x {} \;

      - name: Build extension bundle
        run: |
          npm run compile
          npm --prefix client run rollup

      - name: Package VSIX
        run: npx @vscode/vsce package -o vscode-mcshader-${{ github.sha }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-mcshader-vsix
          path: vscode-mcshader-${{ github.sha }}.vsix
          if-no-files-found: error
